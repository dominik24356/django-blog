{% extends 'base.html' %}

{% block content %}

<div class="header">
    <h1>📘 Lista postów</h1>
    <p>Twoje wpisy blogowe</p>
</div>

<div class="row g-4">

    {% for product in products %}
    <div class="col-lg-4 col-md-6">

        <div class="card blog-card">

            <div class="image-wrapper">
                {% if product.image %}
                    <img src="{{ product.image.url }}">
                {% else %}
                    <img src="https://via.placeholder.com/300x200">
                {% endif %}
            </div>

            <div class="card-body">
                <h5 class="card-title">{{ product.name }}</h5>

                <p class="card-text">
                    {{ product.description|truncatewords:18 }}
                </p>

                <div class="card-actions">
                    <a href="{% url 'product_detail' product.id %}" class="btn btn-primary btn-sm">Szczegóły</a>
                    <a href="{% url 'edit_product' product.id %}" class="btn btn-warning btn-sm">Edytuj</a>
                    <a href="{% url 'delete_product' product.id %}" class="btn btn-danger btn-sm">Usuń</a>
                </div>
            </div>

        </div>

    </div>
    {% endfor %}

</div>

{% endblock %}
