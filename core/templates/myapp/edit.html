{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card p-4 shadow fade-in">
            <h2 class="text-center mb-4">✏️ Edytuj produkt</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Nazwa produktu</label>
                    {{ form.name }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Opis</label>
                    {{ form.description }}
                </div>

                <div class="mb-3">
                    <label class="form-label">Zdjęcie</label>
                    {{ form.image }}
                </div>

                <!-- 💰 CENA -->
                <div class="mb-3">
                    <label class="form-label">Cena (zł)</label>
                    {{ form.price }}
                </div>

                <!-- 📦 STOCK -->
                <div class="mb-3">
                    <label class="form-label">Stan magazynowy</label>
                    {{ form.stock }}
                </div>

                <!-- 🏷️ KATEGORIA -->
                <div class="mb-3">
                    <label class="form-label">Kategoria</label>
                    {{ form.category }}
                </div>

                <div class="d-flex justify-content-between mt-3">
                    <a href="{% url 'product_list' %}" class="btn btn-secondary">
                        ← Powrót
                    </a>
                    <button type="submit" class="btn btn-warning">
                        💾 Zapisz zmiany
                    </button>
                </div>

            </form>
        </div>

    </div>
</div>

{% endblock %}
